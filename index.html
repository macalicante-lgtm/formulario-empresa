<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de empresa — Prácticas FP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 20px; }
    .form { background: white; border-radius: 12px; padding: 28px; max-width: 560px; margin: 0 auto; border: 1px solid #eee; }
    h2 { font-size: 20px; margin-bottom: 6px; color: #185FA5; }
    p { font-size: 13px; color: #666; margin-bottom: 24px; line-height: 1.5; }
    .campo { margin-bottom: 14px; }
    label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    input, select, textarea { width: 100%; padding: 9px 12px; border-radius: 6px; border: 1px solid #ddd; font-size: 14px; font-family: sans-serif; }
    textarea { resize: vertical; min-height: 80px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn { width: 100%; background: #185FA5; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 500; margin-top: 8px; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .exito { background: #EAF3DE; color: #3B6D11; padding: 16px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
    .error { background: #FCEBEB; color: #A32D2D; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 12px; display: none; }
    .required { color: #A32D2D; }
    @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="form">
    <h2>Registro de empresa colaboradora</h2>
    <p>Rellena el formulario para colaborar con nuestro centro en las practicas de Formacion Profesional. Nos pondremos en contacto contigo para confirmar los detalles.</p>
    <div id="formulario">
      <div class="grid">
        <div class="campo">
          <label>Nombre de la empresa <span class="required">*</span></label>
          <input type="text" id="nombre" placeholder="Empresa S.L." />
        </div>
        <div class="campo">
          <label>Sector</label>
          <input type="text" id="sector" placeholder="Informatica, Comercio..." />
        </div>
        <div class="campo">
          <label>Ciudad <span class="required">*</span></label>
          <input type="text" id="ciudad" placeholder="Elche" />
        </div>
        <div class="campo">
          <label>Zona</label>
          <select id="zona">
            <option value="">Seleccionar zona</option>
            <option>Elche centro</option>
            <option>Elche sur</option>
            <option>Elche norte</option>
            <option>Elche oeste</option>
            <option>Alicante</option>
            <option>Santa Pola</option>
            <option>Crevillent</option>
            <option>Guardamar</option>
            <option>Torrevieja</option>
            <option>Otra</option>
          </select>
        </div>
        <div class="campo">
          <label>Plazas disponibles <span class="required">*</span></label>
          <input type="number" id="plazas" min="1" value="1" />
        </div>
        <div class="campo">
          <label>Nombre del tutor <span class="required">*</span></label>
          <input type="text" id="tutor_nombre" placeholder="Nombre y apellidos" />
        </div>
        <div class="campo">
          <label>Email del tutor <span class="required">*</span></label>
          <input type="email" id="tutor_email" placeholder="tutor@empresa.com" />
        </div>
        <div class="campo">
          <label>Telefono de contacto</label>
          <input type="tel" id="tutor_telefono" placeholder="600 000 000" />
        </div>
      </div>
      <div class="campo">
        <label>Observaciones o informacion adicional</label>
        <textarea id="observaciones" placeholder="Horario, requisitos, descripcion de tareas..."></textarea>
      </div>
      <div class="error" id="error-msg"></div>
      <button class="btn" id="btn-enviar" onclick="enviar()">Enviar solicitud</button>
    </div>
    <div class="exito" id="exito-msg">
      Gracias por registrarte. Hemos recibido tu solicitud y nos pondremos en contacto contigo en breve.
    </div>
  </div>
  <script>
    var SUPABASE_URL = 'https://isylpuowetmqgfmslrhb.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlzeWxwdW93ZXRtcWdmbXNscmhiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5OTI5NTcsImV4cCI6MjA5MzU2ODk1N30.iFlyFsxfUY45PWlwkDf3AKzPXfCaf47O3TgTFnuVLq8';
    function enviar() {
      var nombre = document.getElementById('nombre').value.trim();
      var ciudad = document.getElementById('ciudad').value.trim();
      var tutor_nombre = document.getElementById('tutor_nombre').value.trim();
      var tutor_email = document.getElementById('tutor_email').value.trim();
      var plazas = document.getElementById('plazas').value;
      var errorEl = document.getElementById('error-msg');
      errorEl.style.display = 'none';
      if (!nombre || !ciudad || !tutor_nombre || !tutor_email || !plazas) {
        errorEl.textContent = 'Por favor rellena todos los campos obligatorios (*).';
        errorEl.style.display = 'block';
        return;
      }
      var btn = document.getElementById('btn-enviar');
      btn.disabled = true;
      btn.textContent = 'Enviando...';
      var datos = {
        nombre: nombre,
        sector: document.getElementById('sector').value.trim(),
        ciudad: ciudad,
        zona: document.getElementById('zona').value,
        plazas_total: parseInt(plazas),
        tutor_nombre: tutor_nombre,
        tutor_email: tutor_email,
        tutor_telefono: document.getElementById('tutor_telefono').value.trim(),
        observaciones: document.getElementById('observaciones').value.trim(),
        origen: 'formulario_externo',
        pendiente_revision: true,
        activa: false
      };
      fetch(SUPABASE_URL + '/rest/v1/empresas', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(datos)
      }).then(function(response) {
        if (response.ok) {
          document.getElementById('formulario').style.display = 'none';
          document.getElementById('exito-msg').style.display = 'block';
        } else {
          errorEl.textContent = 'Ha ocurrido un error. Por favor intentalo de nuevo.';
          errorEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Enviar solicitud';
        }
      });
    }
  </script>
</body>
</html>
